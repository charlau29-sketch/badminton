<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Badminton 🏸 les Ninjas</title>
  <link rel="apple-touch-icon" href="icone.svg?v=5">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
      background-color: #f5f5f7;
      color: #1d1d1f;
    }
    h1 {
      text-align: center;
      color: #0071e3;
    }
    .joueuses-list {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }
    .joueuse {
      display: flex;
      align-items: center;
      margin: 10px 0;
      font-size: 18px;
    }
    input[type="checkbox"] {
      width: 22px;
      height: 22px;
      margin-right: 12px;
      cursor: pointer;
    }
    button {
      display: block;
      width: 100%;
      padding: 14px;
      background-color: #0071e3;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 20px;
    }
    button:active {
      background-color: #005bb5;
    }
    .terrain {
      background: #e3f2fd;
      border: 2px solid #0071e3;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }
    .terrain h3 {
      margin-top: 0;
      color: #005bb5;
      border-bottom: 1px solid #b3e5fc;
      padding-bottom: 5px;
    }
    .equipe {
      font-size: 16px;
      margin: 5px 0;
    }
  </style>
</head>
<body>

  <h1>Badminton 🏸 les Ninjas</h1>
  
  <p style="text-align: center; color: #6e6e73;">Sélectionnez les présentes pour lundi :</p>

  <div class="joueuses-list">
    <div class="joueuse"><input type="checkbox" id="j1" checked><label for="j1">Diane</label></div>
    <div class="joueuse"><input type="checkbox" id="j2" checked><label for="j2">Céline</label></div>
    <div class="joueuse"><input type="checkbox" id="j3" checked><label for="j3">Sylvie</label></div>
    <div class="joueuse"><input type="checkbox" id="j4" checked><label for="j4">Francine</label></div>
    <div class="joueuse"><input type="checkbox" id="j5" checked><label for="j5">Danielle</label></div>
    <div class="joueuse"><input type="checkbox" id="j6" checked><label for="j6">Suzanne</label></div>
    <div class="joueuse"><input type="checkbox" id="j7" checked><label for="j7">Hélène</label></div>
    <div class="joueuse"><input type="checkbox" id="j8" checked><label for="j8">Brigitte</label></div>
  </div>

  <button onclick="genererEquipes()">Générer les Terrains</button>

  <div id="resultats"></div>

  <script>
    function genererEquipes() {
      const joueuses = [
        { id: 'j1', nom: 'Diane' },
        { id: 'j2', nom: 'Céline' },
        { id: 'j3', nom: 'Sylvie' },
        { id: 'j4', nom: 'Francine' },
        { id: 'j5', nom: 'Danielle' },
        { id: 'j6', nom: 'Suzanne' },
        { id: 'j7', nom: 'Hélène' },
        { id: 'j8', nom: 'Brigitte' }
      ];

      // Filtrer pour ne garder que celles qui sont cochées
      let presentes = joueuses
        .filter(j => document.getElementById(j.id).checked)
        .map(j => j.nom);

      // Mélanger la liste au hasard
      for (let i = presentes.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [presentes[i], presentes[j]] = [presentes[j], presentes[i]];
      }

      const divResultats = document.getElementById('resultats');
      divResultats.innerHTML = '';

      if (presentes.length < 4) {
        divResultats.innerHTML = '<p style="color: red; text-align: center;">Il faut au moins 4 joueuses pour faire un match !</p>';
        return;
      }

      // Terrain 1 (4 premières joueuses)
      let html = '<div class="terrain"><h3>Terrain 1</h3>';
      html += '<div class="equipe"><strong>Équipe A :</strong> ' + presentes[0] + ' et ' + presentes[1] + '</div>';
      html += '<div class="equipe"><strong>Équipe B :</strong> ' + presentes[2] + ' et ' + presentes[3] + '</div>';
      html += '</div>';

      // Terrain 2 (si au moins 8 joueuses)
      if (presentes.length >= 8) {
        html += '<div class="terrain"><h3>Terrain 2</h3>';
        html += '<div class="equipe"><strong>Équipe A :</strong> ' + presentes[4] + ' et ' + presentes[5] + '</div>';
        html += '<div class="equipe"><strong>Équipe B :</strong> ' + presentes[6] + ' et ' + presentes[7] + '</div>';
        html += '</div>';
      } 
      // S'il y a des remplaçantes (entre 5 et 7 joueuses)
      else if (presentes.length > 4) {
        html += '<div class="terrain" style="background: #fff3e0; border-color: #ff9800;">';
        html += '<h3 style="color: #e65100; border-color: #ffe0b2;">En attente / Rotation</h3>';
        let enAttente = presentes.slice(4);
        html += '<div class="equipe"><strong>Joueuses en pause :</strong> ' + enAttente.join(', ') + '</div>';
        html += '</div>';
      }

      divResultats.innerHTML = html;
    }
  </script>

</body>
</html>
